{% extends "base.html" %}

{% block content %}
<div class="px-section reveal-on-scroll" style="padding-top: 100px; min-height: 80vh;">
    <div class="px-section-header">
        <span class="px-section-label">ACCOUNT SETTINGS</span>
        <h2 class="px-section-title">Your Profile</h2>
    </div>

    <div style="max-width: 600px; margin: 0 auto; background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; padding: 40px; box-shadow: var(--shadow-glow);">
        
        <div style="text-align: center; margin-bottom: 40px;">
            <div style="width: 80px; height: 80px; background: var(--gradient); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; color: white; margin: 0 auto 16px; font-weight: 800;">
                {{ current_user.username[0] | upper }}
            </div>
            <h3 style="font-size: 24px; color: var(--text-primary); margin: 0;">{{ current_user.username }}</h3>
            <p style="color: var(--cyan); font-weight: 600; font-size: 14px; margin-top: 4px;">Verified PredictX Member</p>
        </div>

        <div style="display: grid; gap: 20px;">
            <div style="padding: 16px; background: var(--bg-primary); border-radius: 12px; border: 1px solid var(--border);">
                <span style="display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">Username</span>
                <span style="font-family: var(--font-mono); color: var(--text-primary);">{{ current_user.username }}</span>
            </div>

            <div style="padding: 16px; background: var(--bg-primary); border-radius: 12px; border: 1px solid var(--border);">
                <span style="display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">Email Address</span>
                <span style="font-family: var(--font-mono); color: var(--text-primary);">{{ current_user.email }}</span>
            </div>
            
        </div>

        <div style="margin-top: 40px; display: flex; gap: 16px;">
    <a href="{{ url_for('home') }}" class="btn btn-outline" style="flex: 1; justify-content: center;">
        <i class="fa-solid fa-house"></i> Back to Home
    </a>
    
    <a href="{{ url_for('dashboard') }}" class="btn btn-outline" style="flex: 1; justify-content: center; ">
        <i class="fa-solid fa-chart-line"></i> Back to Dashboard
    </a>
</div>
    </div>
</div>
{% endblock %}
